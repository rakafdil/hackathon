server {
    listen 80;
    server_name opato.web.id www.opato.web.id;

    # 1. Frontend (Next.js)
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 2. Backend Core (NestJS)
    # Semua endpoint dari frontend harus diprefix dengan /api/v1 (atau sesuaikan)
    location /api/ {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. AI Service (FastAPI)
    # Jika frontend butuh nembak AI langsung (misal untuk SSE/Streaming Chat)
    location /ai/ {
        proxy_pass http://ai-service:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection 'keep-alive'; # Penting untuk streaming
        proxy_set_header Cache-Control 'no-cache';
    }
}